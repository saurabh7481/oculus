services:
  server:
    build: .
    command: bun run server
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"

  demo:
    build: .
    command: bun run demo
    environment:
      VITE_OCULUS_SERVER_URL: http://localhost:3000
    ports:
      - "5173:5173"
    depends_on:
      - server
